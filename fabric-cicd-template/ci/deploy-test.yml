trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: vg-fabric-<project>

steps:
  - template: /cicd/templates/deploy-fabric-steps.yml
    parameters:
      displayName: Deploy Fabric items to TEST
      serviceConnection: sc-fabric-cicd
      targetEnvironment: test
      workspaceId: $(FABRIC_TEST_WORKSPACE_ID)
      configPath: fabric/solution/config.yml
